<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Party Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-widget">
        <div id="chat-header">
            <h3>Assistent LAN Party</h3>
            <div id="status-indicator"></div>
        </div>
        <div id="chat-display">
            <div class="msg bot-msg">Hola! Soc l'assistent de la LAN Party. En què et puc ajudar?</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Escriu la teva pregunta...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
